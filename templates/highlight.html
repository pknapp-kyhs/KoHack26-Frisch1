{% extends "layout.html" %}

{% block content %}

<h1>Highlight</h1>

<button onclick="toggleSettings()">Settings</button>

<br><br>

<div id="settings-panel">
  <label>Service:</label>
  <select id="service">
    {% for s in services %}
      <option value="{{ s.name_en }}" data-he="{{ s.name_he or s.name_en }}">
        {{ s.name_en }}
      </option>
    {% endfor %}
  </select>
  <br><br>
</div>

<table>
  <tr>
    <td style="padding-right: 32px; vertical-align: top;">
      <strong>Search language:</strong><br>
      <select id="listen-lang" onchange="onListenLangChange()">
        <option value="he">Hebrew (no niqqud)</option>
        <option value="en">English</option>
      </select>
      <br><br>
      <input type="text" id="search-box" placeholder="Type a Hebrew phrase...">
      <button onclick="searchWord()">Find</button>
      <br><br>
      
      <div id="status">Waiting...</div>
      <div id="error-msg" style="color:red"></div>
    </td>
    <td style="vertical-align: top;">
      <strong>Display language:</strong><br>
      <select id="display-lang" onchange="onDisplayLangChange()">
        <option value="he">Hebrew</option>
        <option value="en">English</option>
      </select>
    </td>
  </tr>
</table>

<br>

<div id="results-panel" style="display:none">
  <strong id="results-count"></strong>
  <br><br>
  <div id="results-list"></div>
</div>

<br>

<div id="prayer-name" style="font-weight:bold"></div>
<br>

<div id="prayer-display" style="display:none"></div>

<br>
<button onclick="window.location.href='/'">Home</button>

<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<script>
  const socket = io();

  // CACHING DOM ELEMENTS: 
  // Storing elements in variables on load prevents expensive document.getElementById() 
  // queries during rapid real-time updates, significantly improving frontend performance.
  const serviceEl     = document.getElementById('service');
  const displayLangEl = document.getElementById('display-lang');
  const listenLangEl  = document.getElementById('listen-lang');
  const searchBox     = document.getElementById('search-box');
  const display       = document.getElementById('prayer-display');
  const status        = document.getElementById('status');
  const errMsg        = document.getElementById('error-msg');
  const prayerName    = document.getElementById('prayer-name');
  const resultsPanel  = document.getElementById('results-panel');
  const resultsCount  = document.getElementById('results-count');
  const resultsList   = document.getElementById('results-list');

  // APPLICATION STATE:
  // Tracks the currently loaded text, the active highlighted line, and search results.
  let lines       = [];
  let currentLine = -1;
  let allMatches  = [];

  function toggleSettings() {
    const panel = document.getElementById('settings-panel');
    panel.style.display = panel.style.display === 'none' ? '' : 'none';
  }

  // Helper functions to quickly check state for logic routing
  function isHebrewDisplay() {
    return displayLangEl.value !== 'en';
  }

  function isHebrewSearch() {
    return listenLangEl.value !== 'en';
  }

  // INSTANT I18N UPDATES:
  // Iterates through the dropdown and swaps the visible text based on language choice 
  // without needing a page refresh.
  function updateServiceLabels() {
    Array.from(serviceEl.options).forEach(opt => {
      opt.textContent = isHebrewDisplay() && opt.dataset.he ? opt.dataset.he : opt.value;
    });
  }

  function onDisplayLangChange() {
    updateServiceLabels();
    rerenderLines();
  }

  // UX ENHANCEMENT:
  // Dynamically forces the physical typing cursor to match the syntax of the language 
  // being searched (RTL for Hebrew, LTR for English).
  function onListenLangChange() {
    if (isHebrewSearch()) {
      searchBox.placeholder     = 'Type a Hebrew phrase...';
      searchBox.style.direction = 'rtl';
    } else {
      searchBox.placeholder     = 'Type an English phrase...';
      searchBox.style.direction = 'ltr';
    }
  }

  // INITIATE DISTRIBUTED SEARCH:
  // Gathers parameters and emits them over the WebSocket connection. 
  // This offloads heavy string-matching algorithms to the Python backend, keeping the browser UI fully responsive.
  function searchWord() {
    const phrase = searchBox.value.trim();
    if (!phrase) return;
    
    // Aggressively reset UI state to give immediate visual feedback that a background task is running
    errMsg.textContent  = '';
    status.textContent  = `Searching for "${phrase}"...`;
    resultsPanel.style.display = 'none';
    display.style.display      = 'none';
    
    socket.emit('highlight_search', {
      service:      serviceEl.value,
      word:         phrase,
      search_lang:  listenLangEl.value,
      display_lang: displayLangEl.value,
    });
  }

  // QOL (Quality of Life) feature: Allows Enter key submission
  searchBox.addEventListener('keydown', e => {
    if (e.key === 'Enter') searchWord();
  });

  function getLineText(l) {
    return displayLangEl.value === 'en' ? (l.en_text || '') : (l.he_text || '');
  }

  function isRtl() {
    return displayLangEl.value !== 'en';
  }

  // DYNAMIC DOM RENDERING:
  // Maps over the array of prayer lines returned by the server and constructs an HTML block.
  // It handles bidirectional text rendering on a per-line basis and conditionally applies a yellow highlight.
  function renderLines(highlightIndex) {
    display.innerHTML = lines.map(l => {
      const text        = getLineText(l);
      const highlighted = l.line_index === highlightIndex;
      return `<p id="line-${l.line_index}"
                 style="direction:${isRtl() ? 'rtl' : 'ltr'}; margin: 4px 0; background:${highlighted ? 'yellow' : 'none'};"
               >${text}</p>`;
    }).join('');
    display.style.display = '';
  }

  // AUTO-SCROLLING LOGIC:
  // Re-draws the text blocks, then uses scrollIntoView() to smoothly pin the highlighted line 
  // to the center of the user's viewport so they never lose their place.
  function rerenderLines() {
    if (!lines.length) return;
    renderLines(currentLine);
    if (currentLine >= 0) {
      const el = document.getElementById(`line-${currentLine}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  // PERFORMANCE OPTIMIZATION:
  // Instead of re-rendering the entire HTML string every time the Chazzan moves to a new line,
  // this function reaches into the DOM and changes just the background color CSS of the specific elements.
  // This prevents browser layout jank during rapid real-time updates.
  function moveHighlight(line_index) {
    if (currentLine >= 0) {
      const prev = document.getElementById(`line-${currentLine}`);
      if (prev) prev.style.background = ''; // Clear old highlight
    }
    currentLine = line_index;
    const el = document.getElementById(`line-${line_index}`);
    if (el) {
      el.style.background = 'yellow'; // Apply new highlight
      el.scrollIntoView({ behavior: 'smooth', block: 'center' }); // Keep the new line centered
    }
  }

  // Triggers when a user clicks a specific search result. Asks the server for the full text of that section.
  function gotoMatch(match) {
    socket.emit('highlight_goto', {
      prayer_id:    match.prayer_id,
      line_index:   match.line_index,
      display_lang: displayLangEl.value,
    });
  }

  // WEBSOCKET LISTENER: highlight_results
  // Receives an array of search matches from the server and generates a list of clickable "Go" buttons.
  socket.on('highlight_results', ({ word, matches }) => {
    allMatches = matches;
    status.textContent = `Found ${matches.length} match${matches.length !== 1 ? 'es' : ''} for "${word}"`;

    resultsCount.textContent = `${matches.length} match${matches.length !== 1 ? 'es' : ''}`;
    resultsList.innerHTML = matches.map((m, i) =>
      `<div>
        <button onclick="gotoMatch(allMatches[${i}])">Go</button>
        &nbsp;${m.prayer_name} — line ${m.line_index + 1}
        &nbsp;<small>(${Math.round(m.score * 100)}%)</small>
      </div>`
    ).join('<br>');

    resultsPanel.style.display = '';
  });

  // WEBSOCKET LISTENER: highlight_found
  // Receives the full text array for a prayer and renders it to the screen.
  socket.on('highlight_found', ({ line_index, prayer_name, lines: incoming }) => {
    lines       = incoming;
    currentLine = line_index;
    prayerName.textContent = prayer_name;
    renderLines(line_index);
    document.getElementById('settings-panel').style.display = 'none'; // Auto-hide settings to maximize reading space
    const el = document.getElementById(`line-${line_index}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });

  // Edge-case handling: Search returned zero results
  socket.on('highlight_miss', ({ word }) => {
    status.textContent = `"${word}" not found in this service.`;
  });

  socket.on('highlight_error', ({ message }) => {
    errMsg.textContent = message;
  });

  // THE CORE "CHAZZAN" FEATURE: highlight_update
  // This listener accepts real-time push events from the server and immediately moves the 
  // visual yellow highlight to the corresponding line, keeping the congregation in sync.
  socket.on('highlight_update', ({ line_index, word }) => {
    if (!lines.length) return;
    moveHighlight(line_index);
    status.textContent = `Line ${line_index + 1} — "${word}"`;
  });

  // Initialize the correct labels on page load
  updateServiceLabels();
</script>

{% endblock %}
