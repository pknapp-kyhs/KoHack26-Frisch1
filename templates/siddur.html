{% extends "layout.html" %}

{% block content %}

<h1>Siddur</h1>

<form method="POST" action="/siddur">

  <!-- Service selector: choose which prayer service (e.g., Shacharit) -->
  <!-- auto-submit triggers siddur route to update prayer list based on selected service -->
  <label>Service:</label>
  <select name="service" onchange="this.form.submit()">
    {% for s in services %}
      <option value="{{ s.name_en }}" {% if s.name_en == selected_service %}selected{% endif %}>
        <!-- Use Hebrew service name when display language is Hebrew -->
        {% if selected_lang != 'en' and s.name_he %}{{ s.name_he }}{% else %}{{ s.name_en }}{% endif %}
      </option>
    {% endfor %}
  </select>

  <br><br>

  <!-- Prayer selector: choose a prayer within the selected service -->
  <!-- auto-submit reloads text for selected prayer -->
  <label>Prayer:</label>
  <select name="prayer" onchange="this.form.submit()">
    <option value="">-- select --</option>
    {% for p in prayers %}
      <option value="{{ p.en_title }}" {% if p.en_title == selected_prayer %}selected{% endif %}>
        <!-- Choose Hebrew or English prayer title based on language setting -->
        {% if selected_lang != 'en' and p.he_title %}{{ p.he_title }}{% else %}{{ p.en_title }}{% endif %}
      </option>
    {% endfor %}
  </select>

  <br><br>

  <!-- Language selector: display text in Hebrew (vowel/plain) or English -->
  <label>Language:</label>
  <select name="lang" onchange="this.form.submit()">
    <option value="vowel" {% if selected_lang == 'vowel' %}selected{% endif %}>Hebrew (voweled)</option>
    <option value="he"    {% if selected_lang == 'he'    %}selected{% endif %}>Hebrew (plain)</option>
    <option value="en"    {% if selected_lang == 'en'    %}selected{% endif %}>English</option>
  </select>

</form>

<br>

<!-- Prayer text output zone -->
<!-- if prayer data exists, render the text with proper direction -->
<!-- fallback: show message when a prayer is selected but text missing -->
<!-- starter message when no prayer selected yet -->
{% if prayer %}
  <p dir="{{ 'rtl' if selected_lang != 'en' else 'ltr' }}">{{ text }}</p>
{% elif selected_prayer %}
  <p>Could not load prayer text.</p>
{% else %}
  <p>Select a prayer to view the text.</p>
{% endif %}

<br>

<!-- Prev/Next navigation preserving selected service and language -->
<form method="POST" action="/siddur" style="display:inline">
  <input type="hidden" name="service" value="{{ selected_service }}">
  <input type="hidden" name="lang" value="{{ selected_lang }}">
  <input type="hidden" name="prayer" value="{{ prev_prayer }}">
  <button type="submit" {% if not prev_prayer %}disabled{% endif %}>&#8592; Prev</button>
</form>

<form method="POST" action="/siddur" style="display:inline">
  <input type="hidden" name="service" value="{{ selected_service }}">
  <input type="hidden" name="lang" value="{{ selected_lang }}">
  <input type="hidden" name="prayer" value="{{ next_prayer }}">
  <button type="submit" {% if not next_prayer %}disabled{% endif %}>Next &#8594;</button>
</form>

<br><br>
<a href="/"><button>Home</button></a>

{% endblock %}
