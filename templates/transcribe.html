{% extends "layout.html" %} {% block content %}
<form method="post" action="/transcribe" enctype="multipart/form-data">
  <label for="audio">Upload audio file:</label><br />
  <input type="file" id="audio" name="audio" accept="audio/*" /><br /><br />

  <button type="submit">Upload</button>
</form>
<br />

<button id="startBtn">Start Live Transcription</button>
<button id="stopBtn" disabled>Stop</button>
<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<script src="{{ url_for('static', filename='socket.js') }}"></script>
<div id="transcriptionBox">Live Transcription:</div>
<script>
  const transcriptionBox = document.getElementById("transcriptionBox");
  socket.on("live_transcription_phrase", ({ text }) => {
    transcriptionBox.textContent += " " + text;
  });
</script>
<br />
<button onclick="window.location.href = '/'">Home</button>

{% endblock %}
