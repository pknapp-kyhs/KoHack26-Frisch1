{% extends "layout.html" %}

{% block content %}
<form method="post" action="EN">
    <input type="hidden" id="speed" name="speed" value="{{ speed }}">
    <input type="hidden" id="prayerType" name="prayerType" value="{{ type }}">
    <input type="hidden" id="language" name="language" value="{{ lang }}">
    <input type="hidden" id="prayer" name="prayer" value="{{ prayer }}">
    <input type="submit" value="Switch to English">
</form>

<p>
    {{ text }}
</p>
{% endblock %}
