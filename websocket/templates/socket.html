<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Audio Streaming</title>
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  </head>
  <body>
    <h1>Live Audio Streaming</h1>
    <div id="status"></div>
    <div
      id="transcriptions"
      style="
        padding: 20px;
        background: #f5f5f5;
        min-height: 100px;
        border-radius: 8px;
        font-size: 18px;
        line-height: 1.6;
      "
    ></div>

    <script>
      const socket = io();
      let mediaRecorder,
        recordingSessionId,
        audioContext,
        scriptProcessor,
        microphone,
        audioData = [];

      function showStatus(msg, type) {
        const el = document.getElementById("status");
        el.textContent = msg;
        el.className = type;
        el.style.display = "block";
      }

      function encodeWAV(samples, sampleRate) {
        const buffer = new ArrayBuffer(44 + samples.length * 2);
        const view = new DataView(buffer);

        function writeString(offset, string) {
          for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
          }
        }

        const bytesPerSample = 2;
        const blockAlign = 1 * bytesPerSample;

        writeString(0, "RIFF");
        view.setUint32(4, 36 + samples.length * 2, true);
        writeString(8, "WAVE");
        writeString(12, "fmt ");
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, blockAlign, true);
        view.setUint16(34, 16, true);
        writeString(36, "data");
        view.setUint32(40, samples.length * 2, true);

        let offset = 44;
        for (let i = 0; i < samples.length; i++, offset += 2) {
          const s = Math.max(-1, Math.min(1, samples[i]));
          view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7fff, true);
        }

        return buffer;
      }

      async function startRecording() {
        try {
          audioData = [];
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          audioContext = new (
            window.AudioContext || window.webkitAudioContext
          )();
          microphone = audioContext.createMediaStreamSource(stream);
          scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);

          scriptProcessor.onaudioprocess = (e) => {
            const samples = e.inputBuffer.getChannelData(0);
            audioData.push(...samples);
          };

          microphone.connect(scriptProcessor);
          scriptProcessor.connect(audioContext.destination);

          recordingSessionId = `session_${Date.now()}`;
          socket.emit("audio_session_start", { sessionId: recordingSessionId });

          showStatus("Recording...", "info");

          // Auto-stop after 1.5 seconds
          setTimeout(stopRecording, 1500);
        } catch (error) {
          showStatus("Microphone access denied", "error");
        }
      }

      function stopRecording() {
        if (scriptProcessor) {
          scriptProcessor.disconnect();
          microphone.disconnect();
          audioContext.close();

          const sampleRate = audioContext.sampleRate;
          const wavBuffer = encodeWAV(audioData, sampleRate);
          const blob = new Blob([wavBuffer], { type: "audio/wav" });
          const reader = new FileReader();

          reader.onload = () => {
            socket.emit("audio_chunk", {
              sessionId: recordingSessionId,
              chunk: reader.result.split(",")[1],
            });
            socket.emit("audio_session_end", { sessionId: recordingSessionId });
            // Immediately start next recording (overlap with transcription)
            startRecording();
          };

          reader.readAsDataURL(blob);
          showStatus("Processing...", "info");
        }
      }

      socket.on("audio_saved", (data) => {
        const transDiv = document.getElementById("transcriptions");
        transDiv.textContent += data.transcription + " ";
        transDiv.scrollTop = transDiv.scrollHeight;
        // Transcription completed asynchronously, no need to restart recording
      });

      socket.on("error_message", (data) => {
        showStatus(`Error: ${data.message}`, "error");
      });

      // Auto-start on page load
      window.addEventListener("load", startRecording);
    </script>
  </body>
</html>
