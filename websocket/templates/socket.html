<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Transcription with Vosk</title>
  <!-- Import the Socket.IO client library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    #transcriptionBox {
      border: 1px solid #ccc;
      height: 300px;
      padding: 10px;
      overflow-y: scroll;
      margin-top: 20px;
      background: #f9f9f9;
      white-space: pre-wrap;
      /* Allows text to wrap */
    }

    button {
      font-size: 1.2rem;
      padding: 10px;
      margin-right: 10px;
    }

    #status {
      margin-top: 15px;
      color: #555;
    }
  </style>
</head>

<body>
  <h1>Local Transcription (Vosk)</h1>
  <button id="startBtn">Start Microphone</button>
  <button id="stopBtn" disabled>Stop</button>
  <div id="status">Status: Not connected</div>

  <div id="transcriptionBox"></div>

  <script>
    // 1. Initialize global variables
    const socket = io();
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const transcriptionBox = document.getElementById('transcriptionBox');
    const statusDiv = document.getElementById('status');

    const VOSK_SAMPLE_RATE = 16000;
    let audioContext;
    let scriptProcessor;
    let micStream;

    // 2. Set up WebSocket listeners
    socket.on('connect', () => {
      statusDiv.textContent = 'Status: Connected. Press "Start" to record.';
    });

    socket.on('disconnect', () => {
      statusDiv.textContent = 'Status: Disconnected.';
      stopRecording();
    });

    socket.on('transcription_result', function (data) {
      transcriptionBox.innerHTML += data.text;
      transcriptionBox.scrollTop = transcriptionBox.scrollHeight; // Auto-scroll
    });

    // 3. Start Recording Logic
    startBtn.onclick = async () => {
      try {
        // Initialize Web Audio API components
        window.AudioContext = window.AudioContext || window.webkitAudioContext;
        audioContext = new AudioContext();

        // Get microphone stream
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        statusDiv.textContent = `Status: Recording (Source Rate: ${audioContext.sampleRate}Hz)`;

        const source = audioContext.createMediaStreamSource(micStream);
        const bufferSize = 4096; // A common buffer size

        // Create a ScriptProcessorNode for direct audio processing
        scriptProcessor = audioContext.createScriptProcessor(bufferSize, 1, 1);

        // --- CORE LOGIC: Process and Resample Audio ---
        scriptProcessor.onaudioprocess = (event) => {
          const inputData = event.inputBuffer.getChannelData(0);
          // This function resamples the audio and sends it to the backend
          const resampledData = resampleBuffer(inputData, audioContext.sampleRate, VOSK_SAMPLE_RATE);
          // The backend expects raw Int16 bytes
          socket.emit('audio_stream', convertTo16BitPCM(resampledData));
        };

        // Connect the audio graph: Mic -> Processor -> Destination (to start processing)
        source.connect(scriptProcessor);
        scriptProcessor.connect(audioContext.destination);

        startBtn.disabled = true;
        stopBtn.disabled = false;
      } catch (err) {
        console.error("Error getting microphone:", err);
        statusDiv.textContent = `Error: ${err.message}. Please allow microphone access.`;
      }
    };

    // 4. Stop Recording Logic
    const stopRecording = () => {
      if (micStream) {
        // Stop all tracks on the microphone stream to turn off the browser's recording light
        micStream.getTracks().forEach(track => track.stop());
      }
      if (scriptProcessor) {
        scriptProcessor.disconnect();
      }
      if (audioContext) {
        audioContext.close();
      }
      startBtn.disabled = false;
      stopBtn.disabled = true;
      statusDiv.textContent = 'Status: Stopped. Press "Start" to record again.';
    };
    stopBtn.onclick = stopRecording;


    // --- UTILITY FUNCTIONS ---

    /**
     * Resamples a Float32Array buffer from a source sample rate to a target sample rate.
     */
    function resampleBuffer(inputBuffer, fromSampleRate, toSampleRate) {
      if (fromSampleRate === toSampleRate) {
        return inputBuffer;
      }
      const sampleRateRatio = fromSampleRate / toSampleRate;
      const newLength = Math.round(inputBuffer.length / sampleRateRatio);
      const result = new Float32Array(newLength);
      let offsetResult = 0;
      let offsetBuffer = 0;
      while (offsetResult < result.length) {
        const nextOffsetBuffer = Math.round((offsetResult + 1) * sampleRateRatio);
        let accum = 0, count = 0;
        for (let i = offsetBuffer; i < nextOffsetBuffer && i < inputBuffer.length; i++) {
          accum += inputBuffer[i];
          count++;
        }
        result[offsetResult] = accum / count;
        offsetResult++;
        offsetBuffer = nextOffsetBuffer;
      }
      return result;
    }

    /**
     * Converts a Float32Array of audio samples to a 16-bit PCM ArrayBuffer.
     * Vosk expects data in this format.
     */
    function convertTo16BitPCM(input) {
      const buffer = new ArrayBuffer(input.length * 2); // 2 bytes per sample
      const view = new DataView(buffer);
      for (let i = 0; i < input.length; i++) {
        const s = Math.max(-1, Math.min(1, input[i]));
        // Convert to 16-bit integer
        view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      }
      return buffer;
    }

  </script>
</body>

</html>
